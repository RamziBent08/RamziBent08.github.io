<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turtle - Successioni Autosomiglianti</title>
    <style>
        body {

            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }
        canvas {
            border: 1px solid #ff0000;
            display: block;
            margin: 20px 0;
        }
        button {
            border: 1px solid #ff0000;
            background-color: rgb(255, 157, 157);
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        
    </style>
</head>
<body>
    <h1>Successioni </h1>
    
    

    <div>
        <button onclick="disegnaCurvaKoch()">Curva di Koch</button>
        <button onclick="disegnaDrago()">Curva del Drago</button>
        <button onclick="disegnaFiocco()">Fiocco di Neve</button>
    </div>

    <canvas id="canvas" width="1000" height="900"></canvas>

    <script>
        class Turtle {
            constructor(ctx, x, y) {
                this.ctx = ctx;
                this.x = x;
                this.y = y;
                this.angolo = 0; 
            }

            avanti(distanza) {
                const radianti = this.angolo * Math.PI / 180;
                const nuovoX = this.x + distanza * Math.cos(radianti);
                const nuovoY = this.y + distanza * Math.sin(radianti);

                this.ctx.beginPath();
                this.ctx.moveTo(this.x, this.y);
                this.ctx.lineTo(nuovoX, nuovoY);
                this.ctx.stroke();

                this.x = nuovoX;
                this.y = nuovoY;
            }

            destra(gradi) {
                this.angolo += gradi;
            }

            sinistra(gradi) {
                this.angolo -= gradi;
            }
        }

        function generaSuccessione(assioma, regole, iterazioni) {
            let stringa = assioma;

            for (let i = 0; i < iterazioni; i++) {
                let nuovaStringa = '';
                for (let simbolo of stringa) {
                    nuovaStringa += regole[simbolo] || simbolo;
                }
                stringa = nuovaStringa;
            }

            return stringa;
        }

        function eseguiComandi(turtle, comandi, distanza, angolo) {
            for (let comando of comandi) {
                switch(comando) {
                    case 'F': 
                        turtle.avanti(distanza);
                        break;
                    case '+': 
                        turtle.destra(angolo);
                        break;
                    case '-': 
                        turtle.sinistra(angolo);
                        break;
                }
            }
        }

    
        function disegna(assioma, regole, iterazioni, distanza, angolo, startX, startY) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 1;
            const successione = generaSuccessione(assioma, regole, iterazioni);
            console.log('Successione generata:', successione.substring(0, 100) + '...');
            console.log('Lunghezza:', successione.length);
            const turtle = new Turtle(ctx, startX, startY);
            eseguiComandi(turtle, successione, distanza, angolo);
        }
        
        function disegnaCurvaKoch() {
            const assioma = 'F';
            const regole = { 'F': 'F+F-F-F+F' };
            const iterazioni = 4;
            const distanza = 5;
            const angolo = 90;
            disegna(assioma, regole, iterazioni, distanza, angolo, 100, 400);
        }

        function disegnaDrago() {
            const assioma = 'F';
            const regole = { 
                'F': 'F+F+G',
                'G': 'F+F-G'
            };
            const iterazioni = 12;
            const distanza = 5;
            const angolo = 90;
            disegna(assioma, regole, iterazioni, distanza, angolo, 300, 200);
        }

        function disegnaFiocco() {
            const assioma = 'F++F++F';
            const regole = { 'F': 'F-F++F-F' };
            const iterazioni = 4;
            const distanza = 4;
            const angolo = 60;
            disegna(assioma, regole, iterazioni, distanza, angolo, 400, 500);
        }
        disegnaCurvaKoch();
    </script>

  
</body>
</html>
