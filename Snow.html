<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangolo Frattale</title>
</head>
<body> 
    <canvas id="turtle" width="600" height="600"></canvas>
<script>

    const canvas = document.getElementById("turtle");
    const ctx = canvas.getContext("2d");
    const turtle = {
        x:0,
        y: 0,
        angle: 0,
        pendown: true,
        color: "lightblue",
        name: "tartaruga",
        turn:(a)=>{
            turtle.angle+=a;
        },
        forward:(p)=>{
            ctx.moveTo(turtle.x,turtle.y);
            var x2 = turtle.x + p * Math.cos(turtle.angle*(Math.PI/180));
            var y2 = turtle.y + p * Math.sin(turtle.angle*(Math.PI/180));
            
            if(turtle.pendown === true){
                ctx.lineTo(x2,y2);
                ctx.stroke();
            }else{
                ctx.moveTo(x2,y2);
            }
            turtle.x=x2;
            turtle.y=y2;
        } , 
        move:(x,y)=>{
            this.x = this.x+x;
            this.y = this.y+y;
            ctx.moveTo(this.x,this.y);

        }
    }
    function koch(order, length) {
    if (order === 0) {
        turtle.forward(length);
    } else {
        length = length / 3;
        koch(order - 1, length);
        turtle.turn(60);
        koch(order - 1, length);
        turtle.turn(-120);
        koch(order - 1, length);
        turtle.turn(60);
        koch(order - 1, length);
    }
}

function snowflake(order, length) {
    ctx.lineWidth = 2;
    document.getElementById("turtle").style.color = turtle.color;
    for (let i = 0; i < 3; i++) {
        koch(order, length);
        turtle.turn(-120);
    }
}

ctx.beginPath();
turtle.x = 100;
turtle.y = 350;
turtle.angle = 0;
ctx.moveTo(turtle.x, turtle.y);

function tree(order, length) {
    if (order === 0) {
        turtle.forward(length);
    } else {
        length = length / 3;

        tree(order - 1, length);
        turtle.turn(30);
        tree(order - 1, length);
        turtle.pendown=false;
        turtle.turn(-180);
        turtle.forward(length);
        turtle.pendown=true;
        turtle.turn(120);
        tree(order - 1, length);
        
    }
}

function drawtree(order, length) {
    
    for (let i = 0; i < 2; i++) {
        turtle.turn(-90);
        tree(order, length);
        
    }
}

snowflake(5,300);
    
function createTriangle(x,y){
    
    ctx.moveTo(x,y);
    ctx.lineTo((x+200),y);
    var x1 = x+200 - 200*Math.cos(1.0472);
    var y1 = y + 200*Math.sin(1.0472);
    ctx.lineTo(x1,y1)
    ctx.lineTo(x,y)
    ctx.stroke();
        
}




    

</script>
</body>
</html>
